<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1A4F9C"/>
  <!-- Ears -->
  <ellipse cx="14" cy="26" rx="8" ry="11" fill="#3A73CC"/>
  <ellipse cx="50" cy="26" rx="8" ry="11" fill="#3A73CC"/>
  <!-- Inner ears -->
  <ellipse cx="14" cy="26" rx="5" ry="7" fill="#4A88E0" opacity="0.6"/>
  <ellipse cx="50" cy="26" rx="5" ry="7" fill="#4A88E0" opacity="0.6"/>
  <!-- Head -->
  <ellipse cx="32" cy="24" rx="16" ry="15" fill="#4A88E0"/>
  <!-- Body -->
  <ellipse cx="32" cy="46" rx="14" ry="11" fill="#3A73CC"/>
  <!-- Eyes -->
  <circle cx="26" cy="20" r="3" fill="white"/>
  <circle cx="26" cy="20" r="1.4" fill="#0D2E5E"/>
  <circle cx="38" cy="20" r="3" fill="white"/>
  <circle cx="38" cy="20" r="1.4" fill="#0D2E5E"/>
  <!-- Eye shine -->
  <circle cx="27" cy="19" r="0.8" fill="white"/>
  <circle cx="39" cy="19" r="0.8" fill="white"/>
  <!-- Trunk -->
  <path d="M32 36 Q26 44 24 51 Q23 55 27 55 Q31 55 31 51" stroke="#4A88E0" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Tusk -->
  <path d="M27 30 Q24 35 24 40" stroke="#FAF8F4" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Toes -->
  <ellipse cx="22" cy="56" rx="4" ry="2.5" fill="#0D2E5E" opacity="0.5"/>
  <ellipse cx="32" cy="57" rx="4.5" ry="2.5" fill="#0D2E5E" opacity="0.5"/>
  <ellipse cx="42" cy="56" rx="4" ry="2.5" fill="#0D2E5E" opacity="0.5"/>
</svg>
